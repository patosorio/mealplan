[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "S", "B", "A"]
ignore = [
    "S101",   # assert statements (used in tests)
    "S105",   # hardcoded passwords (false positives on defaults)
    "S311",   # standard pseudo-random generators (not crypto usage)
    "B008",   # function calls in default args (FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"db/migrations/*" = ["N999", "E501"]

[tool.black]
line-length = 88
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["firebase_admin.*", "google.generativeai.*", "pgvector.*"]
ignore_missing_imports = true
