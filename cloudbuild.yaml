steps:
  # ── Backend: build & push ────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest"
      - ./backend

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    waitFor: ["build-backend"]
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend"

  # ── Backend: deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - patrieats-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=2Gi
      - --cpu=2
      - --timeout=60
      - --set-env-vars=ENVIRONMENT=production
      - >-
        --set-secrets=ANTHROPIC_API_KEY=patrieats-anthropic-api-key:latest,
        GEMINI_API_KEY=patrieats-gemini-api-key:latest,
        DATABASE_URL=patrieats-database-url:latest,
        FIREBASE_SERVICE_ACCOUNT_JSON=patrieats-firebase-service-account-json:latest,
        FIREBASE_PROJECT_ID=patrieats-firebase-project-id:latest,
        UPSTASH_REDIS_URL=patrieats-upstash-redis-url:latest,
        INTERNAL_SECRET=patrieats-internal-secret:latest,
        CORS_ORIGINS=patrieats-cors-origins:latest,
        CLOUD_RUN_URL=patrieats-cloud-run-url:latest

  # ── Frontend: build Docker image ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    waitFor: ["-"]
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest"
      - ./frontend

  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    waitFor: ["build-frontend"]
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend"

  # ── Frontend: deploy to Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-frontend-run
    waitFor: ["push-frontend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - patrieats-frontend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --timeout=30

  # ── Frontend: deploy Firebase Hosting rewrite config ─────────────────────────
  # Firebase Hosting forwards all requests to the Cloud Run frontend service.
  # The FIREBASE_TOKEN secret must be created via: firebase login:ci
  - name: "node:20"
    id: deploy-firebase-hosting
    waitFor: ["deploy-frontend-run"]
    dir: frontend
    entrypoint: sh
    secretEnv: ["FIREBASE_TOKEN"]
    args:
      - -c
      - |
        npm ci --omit=dev && \
        npx firebase-tools@latest deploy \
          --only hosting \
          --project=${PROJECT_ID} \
          --token=$$FIREBASE_TOKEN \
          --non-interactive

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/patrieats-firebase-token/versions/latest
      env: "FIREBASE_TOKEN"

substitutions:
  _REGION: europe-west1
  _AR_REPO: patri-eats
  # Cloud Run backend URL — used as NEXT_PUBLIC_API_URL baked into the frontend build.
  # Format: https://patrieats-backend-HASH-ew.a.run.app
  # After first manual deploy, set this to the actual Cloud Run URL.
  _NEXT_PUBLIC_API_URL: "https://patrieats-backend-REPLACE_WITH_HASH-ew.a.run.app"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
